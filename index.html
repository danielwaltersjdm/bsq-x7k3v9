<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="robots" content="noindex, nofollow">
<title>The Quest of St. Mary</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&family=IM+Fell+English:ital@0;1&family=IM+Fell+English+SC&display=swap" rel="stylesheet">
<style>
  :root{
    --void:#0d0b09;        /* near-black, warm as old smoke */
    --crypt:#171310;       /* card ground */
    --bone:#d8c9a3;        /* body ink */
    --bone-dim:#8a7a5f;    /* secondary ink */
    --blood:#8a1c1c;       /* deep accent */
    --blood-lit:#c03434;   /* live accent */
    --gold:#c9a227;        /* tarnished gold */
    --moss:#5a6b4a;
    --line:#3a2f24;        /* rules and borders */
    --hot:#d06a3f; --warm:#b98a3a; --cold:#4f6b7d; --ok:#7d9b6a;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    background:var(--void); color:var(--bone);
    background-image:radial-gradient(ellipse at 50% -10%, #1a1410 0%, var(--void) 60%);
    font-family:'IM Fell English', Georgia, serif;
    min-height:100dvh; font-size:17px;
  }
  #app{max-width:520px; margin:0 auto; padding:0 18px 48px; position:relative}

  /* ── header ─────────────────────────── */
  header{ text-align:center; padding:20px 0 12px; user-select:none; }
  .eyebrow{
    font-family:'IM Fell English SC', serif; font-size:12px;
    letter-spacing:.32em; color:var(--bone-dim); text-transform:lowercase;
  }
  h1{
    font-family:'UnifrakturMaguntia', cursive; font-weight:400;
    font-size:34px; margin:6px 0 2px; color:var(--bone);
    text-shadow:0 0 24px rgba(201,162,39,.15); text-wrap:balance; line-height:1.15;
  }
  .subtitle{font-style:italic; color:var(--bone-dim); font-size:15px; margin:2px 0 0}
  .rule{ border:none; height:14px; margin:10px auto 0; width:220px;
    background:
     linear-gradient(var(--line),var(--line)) center 3px/220px 1px no-repeat,
     linear-gradient(var(--line),var(--line)) center 10px/140px 1px no-repeat;
    position:relative;
  }
  .rule::after{content:"❦"; position:absolute; left:50%; top:-4px; transform:translateX(-50%);
    color:var(--gold); font-size:13px; background:transparent; padding:0 8px}

  /* ── scoreboard ─────────────────────── */
  .strip{
    display:flex; justify-content:space-between; align-items:center;
    font-family:'IM Fell English SC', serif; font-size:13px; letter-spacing:.08em;
    margin:12px 0 4px; color:var(--bone-dim); font-variant-numeric:tabular-nums;
  }
  .strip b{color:var(--gold); font-size:16px}
  .boxes{display:flex; gap:6px}
  .itembox{
    width:22px;height:22px; display:flex;align-items:center;justify-content:center;
    background:radial-gradient(circle at 35% 30%, #e0bb4d, var(--gold) 70%);
    color:#241c07; font-weight:bold; font-size:13px;
    border:1px solid #5c4a12; box-shadow:0 0 8px rgba(201,162,39,.35);
    border-radius:3px;
  }
  .itembox.used{background:var(--crypt); color:var(--line); box-shadow:none; border-color:var(--line)}
  .dots{display:flex; gap:8px; justify-content:center; margin:8px 0 16px}
  .dot{width:8px;height:8px; transform:rotate(45deg); background:var(--line)}
  .dot.done{background:var(--moss)}
  .dot.now{background:var(--blood-lit); box-shadow:0 0 8px rgba(192,52,52,.6)}

  /* ── cards ──────────────────────────── */
  .card{
    background:var(--crypt);
    border:1px solid var(--line); border-radius:2px;
    padding:22px 20px; margin-bottom:16px; position:relative;
    box-shadow:0 4px 24px rgba(0,0,0,.5), inset 0 0 60px rgba(0,0,0,.35);
  }
  .card::before,.card::after{
    content:"✕"; position:absolute; color:var(--line); font-size:10px; line-height:1;
  }
  .card::before{top:6px; left:8px} .card::after{bottom:6px; right:8px}
  .stopnum{
    font-family:'IM Fell English SC', serif; font-size:12px;
    letter-spacing:.28em; color:var(--blood-lit); margin-bottom:10px;
  }
  .riddle{
    font-size:18.5px; line-height:1.65; white-space:pre-line; font-style:italic;
    color:var(--bone);
  }
  .riddle::first-letter{
    font-family:'UnifrakturMaguntia', cursive; font-style:normal;
    font-size:200%; color:var(--gold); line-height:.8; padding-right:2px;
  }
  .way{
    margin-top:14px; padding-top:12px; border-top:1px solid var(--line);
    font-size:14.5px; color:var(--bone-dim); font-style:normal;
  }
  .way b{color:var(--bone); font-weight:normal; font-family:'IM Fell English SC',serif; letter-spacing:.14em; font-size:12.5px}
  .tasktext{font-size:17px; line-height:1.6; white-space:pre-line}

  /* ── proximity meter ────────────────── */
  .meter{
    text-align:center; padding:14px 10px; margin-bottom:16px;
    border:1px solid var(--line); border-left:3px solid var(--line); border-right:3px solid var(--line);
    background:linear-gradient(180deg, rgba(0,0,0,.25), transparent);
    transition:border-color .6s;
  }
  .meter .word{font-family:'IM Fell English SC',serif; font-size:19px; letter-spacing:.12em}
  .meter .hintline{font-size:13px; color:var(--bone-dim); margin-top:4px; font-style:italic}
  .meter.cold{border-left-color:var(--cold); border-right-color:var(--cold)} .meter.cold .word{color:var(--cold)}
  .meter.warm{border-left-color:var(--warm); border-right-color:var(--warm)} .meter.warm .word{color:var(--warm)}
  .meter.hot{border-left-color:var(--hot); border-right-color:var(--hot)} .meter.hot .word{color:var(--hot)}
  .meter.here{border-left-color:var(--ok); border-right-color:var(--ok)} .meter.here .word{color:var(--ok)}

  /* ── buttons & inputs ───────────────── */
  button{
    font-family:'IM Fell English SC', serif; letter-spacing:.12em;
    border:1px solid var(--line); border-radius:2px;
    padding:14px 16px; font-size:16px; cursor:pointer; touch-action:manipulation;
    background:var(--crypt); color:var(--bone);
  }
  .btn-primary{
    width:100%;
    background:linear-gradient(180deg, #6d1616, var(--blood));
    border-color:#4a0f0f; color:#efdfc0;
    box-shadow:0 2px 12px rgba(138,28,28,.4);
  }
  .btn-ghost{width:100%; background:transparent; color:var(--gold); border-color:var(--gold)}
  .btn-hint{
    width:100%; margin-top:10px;
    background:linear-gradient(180deg,#3a2f14,#2a2210); color:var(--gold); border-color:#5c4a12;
  }
  .btn-hint:disabled{color:var(--line); border-color:var(--line); background:var(--crypt)}
  button:active{transform:scale(.985)}

  input[type=text]{
    width:100%; font-size:18px; padding:13px 12px; margin:12px 0 8px;
    border:1px solid var(--line); border-radius:2px;
    background:#0f0d0a; color:var(--bone); font-family:'IM Fell English', serif;
  }
  input[type=text]:focus{outline:1px solid var(--gold); border-color:var(--gold)}
  input[type=text]::placeholder{color:#4d4233}

  .hintrevealed{
    border-left:2px solid var(--gold); padding:10px 14px; margin-top:12px;
    background:rgba(201,162,39,.06); font-style:italic; font-size:15.5px;
  }
  .hintrevealed b{font-family:'IM Fell English SC',serif; color:var(--gold); font-style:normal; font-weight:normal; letter-spacing:.1em; font-size:12.5px}
  .wrong{color:var(--blood-lit); font-size:14px; min-height:20px; margin:0; font-style:italic}

  /* ── portrait ───────────────────────── */
  .portrait-frame{
    width:190px; height:238px; margin:6px auto 14px; position:relative;
    border:1px solid var(--gold); border-radius:95px 95px 3px 3px;
    padding:7px; background:linear-gradient(180deg, rgba(201,162,39,.12), transparent);
    box-shadow:0 0 30px rgba(201,162,39,.12), inset 0 0 20px rgba(0,0,0,.5);
  }
  .portrait-frame .inner{
    width:100%; height:100%; overflow:hidden; border-radius:88px 88px 2px 2px;
    background:#0f0d0a; display:flex; align-items:center; justify-content:center;
    border:1px solid var(--line);
  }
  .portrait-frame img{width:100%; height:100%; object-fit:cover; object-position:top;
    filter:sepia(.25) contrast(1.05) brightness(.92);}
  .portrait-frame .placeholder{color:var(--line); font-size:56px}
  .portrait-caption{
    text-align:center; font-family:'IM Fell English SC',serif; font-size:13px;
    letter-spacing:.26em; color:var(--gold); margin-bottom:4px;
  }

  /* ── celebration ────────────────────── */
  #celebrate{
    position:fixed; inset:0; display:none; align-items:center; justify-content:center;
    background:rgba(5,4,3,.8); z-index:50; flex-direction:column; padding:20px;
  }
  #celebrate.show{display:flex}
  #celebrate .msg{
    background:var(--crypt); color:var(--bone); border:1px solid var(--gold);
    border-radius:2px; padding:30px 30px; text-align:center; max-width:340px;
    box-shadow:0 0 60px rgba(201,162,39,.2);
  }
  #celebrate .msg .big{font-size:34px; margin-bottom:8px}
  #celebrate .msg .pts{font-family:'IM Fell English SC',serif; color:var(--gold); font-size:17px; letter-spacing:.1em}
  #c-title{font-size:19px; font-style:italic; margin-bottom:6px}
  canvas#confetti{position:fixed; inset:0; pointer-events:none; z-index:60}

  .banner{
    font-size:14px; border:1px solid var(--cold); padding:10px 14px; margin-bottom:14px;
    background:rgba(79,107,125,.08); font-style:italic;
  }
  .small{font-size:13px; color:var(--bone-dim); font-style:italic}
  .center{text-align:center}
  .medal{font-size:62px; text-align:center; margin:8px 0; filter:drop-shadow(0 0 14px rgba(201,162,39,.4))}
  .scoretable{width:100%; border-collapse:collapse; font-size:14.5px; margin-top:10px; font-variant-numeric:tabular-nums}
  .scoretable td{padding:7px 4px; border-bottom:1px solid var(--line)}
  .scoretable td:last-child{text-align:right; font-family:'IM Fell English SC',serif; color:var(--bone-dim)}

  /* lore card */
  .lore-head{
    font-family:'UnifrakturMaguntia',cursive; font-size:24px; color:var(--gold);
    text-align:center; margin-bottom:4px;
  }
  .lore-sub{
    text-align:center; font-family:'IM Fell English SC',serif; font-size:12px;
    letter-spacing:.3em; color:var(--bone-dim); margin-bottom:14px;
  }
  .lore-body{font-size:16.5px; line-height:1.7}
  .lore-body em{color:var(--gold)}

  footer{margin-top:26px; text-align:center; font-size:12px; color:var(--bone-dim); font-style:italic}
  footer .mark{color:var(--blood-lit)}
  @media (prefers-reduced-motion: reduce){ *{transition:none !important; animation:none !important} }
</style>
</head>
<body>
<div id="app">
  <header id="hdr">
    <h1>The Quest of St. Mary</h1>
    <p class="subtitle">equal parts intellect and heart</p>
    <hr class="rule">
  </header>

  <div class="strip" id="strip" style="display:none; justify-content:center">
    <span>Seal <b id="s-stop">1</b>&#8202;/&#8202;8</span>
  </div>
  <div class="dots" id="dots" style="display:none"></div>

  <div id="screen"></div>

</div>

<div id="celebrate">
  <div class="msg">
    <div class="big" id="c-big">🕯️</div>
    <div id="c-title"></div>
    <div class="pts" id="c-pts"></div>
    <div class="small" id="c-sub" style="margin-top:8px"></div>
    <button class="btn-primary" style="margin-top:18px" onclick="dismissCelebrate()">Continue</button>
  </div>
</div>
<canvas id="confetti"></canvas>

   lore:{title:"Rosegate", body:"<em>The flower blooming in iron is the rose: the fence's rosettes gave this 1857 house its name, Rosegate.</em> Anne Rice, the woman who gave the grave a tongue, bought it in 1989 and made it the Mayfair witches' ancestral home in The Witching Hour; her deathless lovers, Louis and Lestat, were dreamed a few blocks from here. She once launched a book by leaving this house in a coffin, in a jazz funeral she threw for herself. The neighbors coped."}
 },
 { name:"Buckner Mansion", geo:{lat:29.9319568, lon:-90.0790925},
   riddle:"Eight-and-forty limbs of white\nuphold a house that is not home;\na screen-born coven spent one night\nand left me to the dust alone.\nMy gates are shut, my grounds are still:\ncount my limbs, if count you will.",
   way:"<b>the way</b> — Two blocks downtown on Chestnut to Jackson, then one block toward the Avenue. The columns rise at Jackson and Coliseum.",
   hints:[
     "Television witches schooled here, though the real ones never did.",
     "Jackson Avenue. The grandest house on it, wearing a forest of white.",
     "Buckner Mansion, 1410 Jackson Ave. Miss Robichaux's Academy, if you believe the screen."
   ],
   tasks:[
     {type:"input", check:"range", min:44, max:52,
      prompt:"The Keeper claims eight-and-forty limbs.\nThe Keeper has been known to lie.\nCount the columns yourself and give your tally.",
      placeholder:"Your count"}
   ],
   arrive:"The coven's house. It photographs like it knows something.",
   lore:{title:"Buckner Mansion", body:"<em>Eight-and-forty limbs: the 48 fluted columns that cotton king Henry Buckner raised in 1856, reportedly to outshine a rival's mansion in Natchez.</em> For sixty years it housed the Soulé business college, and in 2013 television made it Miss Robichaux's Academy for Exceptional Young Ladies, the coven school of American Horror Story. The real house has witnessed no verified witchcraft. Whatever you counted, the columns will not confirm it after dark."}
 },
 { name:"Hot Tin", geo:{lat:29.9350837, lon:-90.0796890},
   riddle:"You walked among the sleeping dead,\npast iron corn and witches' walls;\nnow climb to where the cat once fled,\na tin roof hot above Saint Charles.\nEleven floors the tower knows;\nthe river bends, the sun drops slow.\nTwo glasses stand there, silver-dry:\ndrink to the hunt, the roof, the sky.",
   way:"<b>the way</b> — Two blocks toward the Avenue, then downtown along St. Charles to Josephine, near a third of a mile. The tall hotel; ride to the eleventh floor.",
   hints:[
     "A thirsty playwright named your ride an hour ago; his cat named your destination.",
     "The Pontchartrain Hotel's roof, where the whole city shows itself.",
     "Hot Tin, 2031 St. Charles, 11th floor. Order two martinis; the quest is won."
   ],
   tasks:[
     {type:"referee",
      prompt:"Two martinis, silver and dry. The city below, the quest behind.\nThe referee confirms the final toast."}
   ],
   arrive:"The roof. The city. The end of the road.",
   lore:{title:"Hot Tin", body:"<em>The cat that fled up here belongs to Tennessee Williams, who lived at the Pontchartrain Hotel while shaping A Streetcar Named Desire: the wyrm you rode this afternoon runs through his title, and this bar's name is his hot tin roof.</em> Eleven floors up, the whole quest lies below you: the avenue, the oaks, the river's crescent. The bean stayed at the bookshop; these glasses are silver and dry. One last envelope waits at headquarters: two canvases, two sets of paints. You paint Molly. The Keeper paints Daisy. The portraits get judged, hung, and never spoken of again."}
 }
];

/* ═══════════ STATE ═══════════ */
let S = load() || { screen:"start", stop:0, task:0, score:0, boxes:3,
                    hintsUsed:STOPS.map(()=>0), arrived:false, manual:false, done:false };
function save(){ localStorage.setItem("msq3", JSON.stringify(S)); }
function load(){ try{ return JSON.parse(localStorage.getItem("msq3")); }catch(e){ return null; } }

/* ═══════════ GEO ═══════════ */
let watchId=null, lastDist=null, geoOK=false, lastGeoErr=null;
function startGeo(){
  if(!("geolocation" in navigator)){ geoFail("no location service"); return; }
  try{
    watchId = navigator.geolocation.watchPosition(onPos, e=>geoFail(e.message),
      {enableHighAccuracy:true, maximumAge:3000, timeout:15000});
  }catch(e){ geoFail(String(e)); }
}
function geoFail(msg){ geoOK=false; lastGeoErr=msg; S.manual=true; save(); render(); }
function geoBanner(){
  return (!geoOK && lastGeoErr)
    ? `<div class="banner">The stars are clouded (${esc(lastGeoErr)}). Manual mode: the referee unseals each stop.</div>` : "";
}
function onPos(p){
  geoOK=true;
  if(lastGeoErr){ lastGeoErr=null; render(); }
  if(S.screen!=="clue"||S.arrived||S.done) return;
  const t=STOPS[S.stop];
  if(!t.geo) return;
  lastDist = haversine(p.coords.latitude,p.coords.longitude,t.geo.lat,t.geo.lon);
  updateMeter();
  if(lastDist<=UNLOCK_RADIUS) reached();
}
function haversine(a,b,c,d){
  const R=6371000, r=x=>x*Math.PI/180;
  const dLat=r(c-a), dLon=r(d-b);
  const h=Math.sin(dLat/2)**2+Math.cos(r(a))*Math.cos(r(c))*Math.sin(dLon/2)**2;
  return 2*R*Math.asin(Math.sqrt(h));
}
function meterState(m){
  if(m==null) return {cls:"", word:"Reading the stars…", sub:"walk on; the sky will speak"};
  if(m<=UNLOCK_RADIUS) return {cls:"here", word:"You stand upon it", sub:""};
  if(m<150) return {cls:"hot", word:"The veil is thin", sub:"less than a block and a half"};
  if(m<400) return {cls:"warm", word:"The scent grows warm", sub:"a few blocks yet"};
  return {cls:"cold", word:"The trail is cold", sub:"you are far; think again"};
}
function updateMeter(){
  const el=document.getElementById("meter"); if(!el) return;
  const st=meterState(lastDist);
  el.className="meter "+st.cls;
  el.querySelector(".word").textContent=st.word;
  el.querySelector(".hintline").textContent=st.sub;
}

/* ═══════════ WAKE LOCK ═══════════ */
let wl=null;
async function keepAwake(){
  try{ if("wakeLock" in navigator){ wl=await navigator.wakeLock.request("screen");
    document.addEventListener("visibilitychange", async()=>{ if(document.visibilityState==="visible"&&wl!==null){ try{ wl=await navigator.wakeLock.request("screen"); }catch(e){} } });
  }}catch(e){}
}

/* ═══════════ FLOW ═══════════ */
function reached(){
  if(S.arrived) return;
  S.arrived=true;
  save();
  celebrate("🕯️", STOPS[S.stop].arrive, "", "the seal awaits its task");
  render();
}
function celebrate(icon,title,pts,sub){
  document.getElementById("c-big").textContent=icon;
  document.getElementById("c-title").textContent=title;
  document.getElementById("c-pts").textContent=pts;
  document.getElementById("c-sub").textContent=sub||"";
  document.getElementById("celebrate").classList.add("show");
  burst();
  if(navigator.vibrate) navigator.vibrate([80,40,80]);
}
function dismissCelebrate(){ document.getElementById("celebrate").classList.remove("show"); render(); }

function useHint(){
  if(S.hintsUsed[S.stop]>=3) return;
  S.hintsUsed[S.stop]++;
  save(); render();
}
function checkAnswer(task, raw){
  const v=(raw||"").trim().toLowerCase();
  if(task.check==="list") return task.answers.some(a=>v===a||v.includes(a));
  if(task.check==="contains") return v.includes(task.word);
  if(task.check==="all") return task.words.every(w=>v.includes(w));
  if(task.check==="range"){ const n=parseInt(v.replace(/\D/g,""),10); return !isNaN(n)&&n>=task.min&&n<=task.max; }
  return false;
}
function submitTask(){
  const t=STOPS[S.stop].tasks[S.task];
  const v=document.getElementById("answer").value;
  if(checkAnswer(t,v)){ taskDone(); }
  else{
    document.getElementById("wrong").textContent="Not so. Look again; the dead are patient, the Keeper less.";
    if(navigator.vibrate) navigator.vibrate(120);
  }
}
function taskDone(){
  const st=STOPS[S.stop];
  if(S.task < st.tasks.length-1){
    S.task++;
    save();
    celebrate("🗝️","The task is met","","another asks…");
  } else {
    S.screen="lore";
    save();
    celebrate("🗝️","The seal is broken","","the Keeper would speak…");
  }
}
function nextStop(){
  if(S.stop>=STOPS.length-1){ S.done=true; S.screen="final"; }
  else{ S.stop++; S.task=0; S.arrived=false; lastDist=null; S.screen="clue"; }
  save(); render();
}

/* referee long-press on header = force unlock */
let pressT=null;
const hdr=document.getElementById("hdr");
hdr.addEventListener("touchstart",()=>{ pressT=setTimeout(refOverride,1600); },{passive:true});
hdr.addEventListener("touchend",()=>clearTimeout(pressT));
hdr.addEventListener("mousedown",()=>{ pressT=setTimeout(refOverride,1600); });
hdr.addEventListener("mouseup",()=>clearTimeout(pressT));
function refOverride(){
  if(S.screen!=="clue"||S.done) return;
  if(!S.arrived) reached();
}

/* ═══════════ RENDER ═══════════ */
function esc(s){ return String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
function portraitHTML(caption){
  return `<div class="portrait-frame"><div class="inner">${
    PORTRAIT ? `<img src="${PORTRAIT}" alt="the huntress">` : `<div class="placeholder">⚜</div>`
  }</div></div><div class="portrait-caption">${caption}</div>`;
}
function render(){
  const scr=document.getElementById("screen");
  const strip=document.getElementById("strip"), dots=document.getElementById("dots");

  if(S.screen==="start"){
    strip.style.display="none"; dots.style.display="none";
    scr.innerHTML=`
      <div class="card center">
        ${portraitHTML("the huntress")}
        <p class="riddle" style="text-align:left">Claire. A quest is laid before you.\nThe dead, the witch, the iron harvest\nall wait to learn the victor's name.</p>
        <p class="small" style="margin:14px 0 4px">Whispers wait beneath every riddle; open as many as you please.\nThe referee walks beside you and settles all disputes.</p>
        <button class="btn-primary" style="margin-top:14px" onclick="begin()">Break the first seal</button>
      </div>
      ${geoBanner()}`;
    return;
  }

  strip.style.display="flex"; dots.style.display="flex";
  document.getElementById("s-stop").textContent=Math.min(S.stop+1,STOPS.length);
  dots.innerHTML=STOPS.map((_,i)=>`<span class="dot ${i<S.stop?"done":i===S.stop?"now":""}"></span>`).join("");

  if(S.screen==="final"){
    scr.innerHTML=`
      <div class="card center">
        <div class="medal">🥇</div>
        <h2 class="lore-head">Gold, and fairly won</h2>
        <p class="tasktext" style="text-align:center">The quest is beaten. The Keeper owes you the medal, the bragging rights, and public acknowledgment that you would survive a horror film.</p>
      </div>
      <div class="card">
        <div class="stopnum">the last envelope</div>
        <p class="riddle">At headquarters wait two canvases,\ntwo sets of paints, two patient dogs.\nYou shall paint Molly; the Keeper, Daisy.\nThe portraits shall be judged, and hung,\nand never spoken of again.</p>
      </div>
      <button class="btn-ghost" onclick="if(confirm('Reset the whole quest?')){localStorage.removeItem('msq3');location.reload()}">Reset the quest</button>`;
    return;
  }

  const st=STOPS[S.stop];
  const used=S.hintsUsed[S.stop];

  if(S.screen==="lore"){
    scr.innerHTML=`
      <div class="card">
        <div class="lore-head">${esc(st.lore.title)}</div>
        <div class="lore-sub">the keeper's notes</div>
        <p class="lore-body">${st.lore.body}</p>
      </div>
      <button class="btn-primary" onclick="nextStop()">${S.stop>=STOPS.length-1?"The final reckoning":"Break the next seal"}</button>`;
    return;
  }

  const needsTravel = st.geo && !S.arrived;
  if(needsTravel){
    const mst=meterState(lastDist);
    scr.innerHTML=`
      ${geoBanner()}
      <div class="card">
        <div class="stopnum">seal ${S.stop+1} of ${STOPS.length}</div>
        <p class="riddle">${esc(st.riddle)}</p>
        <p class="way">${st.way}</p>
        ${Array.from({length:used},(_,i)=>`<div class="hintrevealed"><b>whisper ${i+1}</b> — ${esc(st.hints[i])}</div>`).join("")}
      </div>
      <div class="meter ${mst.cls}" id="meter">
        <div class="word">${mst.word}</div>
        <div class="hintline">${mst.sub}</div>
      </div>
      <button class="btn-hint" onclick="useHint()" ${used>=3?"disabled":""}>
        ${used>=3?"No whispers remain here":"Open a whisper ("+(used+1)+" of 3)"}
      </button>
      ${S.manual?`<button class="btn-ghost" style="margin-top:10px" onclick="refOverride()">Referee: we stand upon it</button>`:""}`;
  } else {
    const t=st.tasks[S.task];
    const multi=st.tasks.length>1 ? ` &middot; task ${S.task+1} of ${st.tasks.length}` : "";
    scr.innerHTML=`
      ${geoBanner()}
      <div class="card">
        <div class="stopnum">${esc(st.name)}${multi}</div>
        ${(!st.geo)?`<p class="riddle">${esc(st.riddle)}</p><p class="way">${st.way}</p>`:""}
        <p class="tasktext" style="margin-top:${st.geo?0:16}px">${esc(t.prompt)}</p>
        ${t.type==="input"?`
          <input type="text" id="answer" placeholder="${esc(t.placeholder||"Answer")}" autocomplete="off" autocapitalize="off">
          <p class="wrong" id="wrong"></p>
          <button class="btn-primary" onclick="submitTask()">Offer the answer</button>`
        :`
          <p class="small" style="margin:10px 0 14px">This one is judged by the referee, who is famously strict and easily bribed.</p>
          <button class="btn-primary" onclick="taskDone()">The referee confirms ✓</button>`}
        ${(!st.geo)?Array.from({length:used},(_,i)=>`<div class="hintrevealed"><b>whisper ${i+1}</b> — ${esc(st.hints[i])}</div>`).join(""):""}
      </div>
      ${(!st.geo)?`
      <button class="btn-hint" onclick="useHint()" ${used>=3?"disabled":""}>
        ${used>=3?"No whispers remain here":"Open a whisper ("+(used+1)+" of 3)"}
      </button>`:""}`;
  }
}
function begin(){ S.screen="clue"; save(); render(); startGeo(); keepAwake(); }

/* ═══════════ EMBERS (celebration) ═══════════ */
function burst(){
  if(matchMedia("(prefers-reduced-motion: reduce)").matches) return;
  const cv=document.getElementById("confetti"), ctx=cv.getContext("2d");
  cv.width=innerWidth; cv.height=innerHeight;
  const colors=["#c9a227","#8a1c1c","#d8c9a3","#5a6b4a","#e0bb4d"];
  const P=Array.from({length:110},()=>({
    x:innerWidth/2+(Math.random()-.5)*90, y:innerHeight*0.35,
    vx:(Math.random()-.5)*8, vy:-Math.random()*9-3,
    s:3+Math.random()*5, c:colors[Math.floor(Math.random()*colors.length)],
    r:Math.random()*Math.PI, vr:(Math.random()-.5)*.3, life:1
  }));
  let n=0;
  (function tick(){
    ctx.clearRect(0,0,cv.width,cv.height); n++;
    P.forEach(p=>{
      p.x+=p.vx; p.y+=p.vy; p.vy+=.26; p.r+=p.vr; p.life-=.008;
      ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.r);
      ctx.globalAlpha=Math.max(0,p.life);
      ctx.fillStyle=p.c; ctx.fillRect(-p.s/2,-p.s/2,p.s,p.s*.62);
      ctx.restore();
    });
    if(n<170) requestAnimationFrame(tick); else ctx.clearRect(0,0,cv.width,cv.height);
  })();
}

/* boot */
render();
if(S.screen!=="start" && !S.done){ startGeo(); keepAwake(); }
</script>
