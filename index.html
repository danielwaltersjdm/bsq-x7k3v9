<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="robots" content="noindex, nofollow">
<title>The Quest of St. Mary</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&family=IM+Fell+English:ital@0;1&family=IM+Fell+English+SC&display=swap" rel="stylesheet">
<style>
  :root{
    --void:#0d0b09; --crypt:#171310; --bone:#d8c9a3; --bone-dim:#8a7a5f;
    --blood:#8a1c1c; --blood-lit:#c03434; --gold:#c9a227; --moss:#5a6b4a;
    --line:#3a2f24; --hot:#d06a3f; --warm:#b98a3a; --cold:#4f6b7d; --ok:#7d9b6a;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    background:var(--void); color:var(--bone);
    background-image:radial-gradient(ellipse at 50% -10%, #1a1410 0%, var(--void) 60%);
    font-family:'IM Fell English', Georgia, serif;
    min-height:100dvh; font-size:25px;
  }
  #app{max-width:520px; margin:0 auto; padding:0 18px 48px; position:relative}

  header{ text-align:center; padding:20px 0 12px; user-select:none; }
  h1{
    font-family:'UnifrakturMaguntia', cursive; font-weight:400;
    font-size:44px; margin:6px 0 2px; color:var(--bone);
    text-shadow:0 0 24px rgba(201,162,39,.15); text-wrap:balance; line-height:1.15;
  }
  .subtitle{font-style:italic; color:var(--bone-dim); font-size:22px; margin:2px 0 0}
  .bee{color:var(--bone); opacity:.85; margin:2px 0 0; line-height:0}
  .compass{display:flex; flex-direction:column; align-items:center; gap:2px; margin-bottom:8px; color:var(--bone-dim)}
  .compass svg{overflow:visible}
  .compass-note{font-size:19px; font-style:italic}
  .rule{ border:none; height:14px; margin:10px auto 0; width:220px;
    background:
     linear-gradient(var(--line),var(--line)) center 3px/220px 1px no-repeat,
     linear-gradient(var(--line),var(--line)) center 10px/140px 1px no-repeat;
    position:relative;
  }
  .rule::after{content:"❦"; position:absolute; left:50%; top:-4px; transform:translateX(-50%);
    color:var(--gold); font-size:19px; padding:0 8px}

  .strip{
    display:flex; justify-content:center; align-items:center;
    font-family:'IM Fell English SC', serif; font-size:19px; letter-spacing:.08em;
    margin:12px 0 4px; color:var(--bone-dim); font-variant-numeric:tabular-nums;
  }
  .strip b{color:var(--gold); font-size:23px}
  .dots{display:flex; gap:8px; justify-content:center; margin:8px 0 16px}
  .dot{width:8px;height:8px; transform:rotate(45deg); background:var(--line)}
  .dot.done{background:var(--moss)}
  .dot.now{background:var(--blood-lit); box-shadow:0 0 8px rgba(192,52,52,.6)}

  .card{
    background:var(--crypt); border:1px solid var(--line); border-radius:2px;
    padding:22px 20px; margin-bottom:16px; position:relative;
    box-shadow:0 4px 24px rgba(0,0,0,.5), inset 0 0 60px rgba(0,0,0,.35);
  }
  .card::before,.card::after{ content:"✕"; position:absolute; color:var(--line); font-size:14px; line-height:1; }
  .card::before{top:6px; left:8px} .card::after{bottom:6px; right:8px}
  .stopnum{
    font-family:'IM Fell English SC', serif; font-size:17px;
    letter-spacing:.28em; color:var(--blood-lit); margin-bottom:10px;
  }
  .riddle{ font-size:27px; line-height:1.65; white-space:pre-line; font-style:italic; color:var(--bone); }
  .riddle::first-letter{
    font-family:'UnifrakturMaguntia', cursive; font-style:normal;
    font-size:200%; color:var(--gold); line-height:.8; padding-right:2px;
  }
  .way{
    margin-top:14px; padding-top:12px; border-top:1px solid var(--line);
    font-size:21px; color:var(--bone-dim); font-style:normal;
  }
  .way b{color:var(--bone); font-weight:normal; font-family:'IM Fell English SC',serif; letter-spacing:.14em; font-size:18px}
  .tasktext{font-size:25px; line-height:1.6; white-space:pre-line}

  .meter{
    text-align:center; padding:14px 10px; margin-bottom:16px;
    border:1px solid var(--line); border-left:3px solid var(--line); border-right:3px solid var(--line);
    background:linear-gradient(180deg, rgba(0,0,0,.25), transparent);
    transition:border-color .6s;
  }
  .meter .word{font-family:'IM Fell English SC',serif; font-size:28px; letter-spacing:.12em}
  .meter .hintline{font-size:19px; color:var(--bone-dim); margin-top:4px; font-style:italic}
  .meter.cold{border-left-color:var(--cold); border-right-color:var(--cold)} .meter.cold .word{color:var(--cold)}
  .meter.warm{border-left-color:var(--warm); border-right-color:var(--warm)} .meter.warm .word{color:var(--warm)}
  .meter.hot{border-left-color:var(--hot); border-right-color:var(--hot)} .meter.hot .word{color:var(--hot)}
  .meter.here{border-left-color:var(--ok); border-right-color:var(--ok)} .meter.here .word{color:var(--ok)}

  button{
    font-family:'IM Fell English SC', serif; letter-spacing:.12em;
    border:1px solid var(--line); border-radius:2px;
    padding:14px 16px; font-size:23px; cursor:pointer; touch-action:manipulation;
    background:var(--crypt); color:var(--bone);
  }
  .btn-primary{
    width:100%;
    background:linear-gradient(180deg, #6d1616, var(--blood));
    border-color:#4a0f0f; color:#efdfc0;
    box-shadow:0 2px 12px rgba(138,28,28,.4);
  }
  .btn-ghost{width:100%; background:transparent; color:var(--gold); border-color:var(--gold)}
  .btn-hint{
    width:100%; margin-top:10px;
    background:linear-gradient(180deg,#3a2f14,#2a2210); color:var(--gold); border-color:#5c4a12;
  }
  .btn-hint:disabled{color:var(--line); border-color:var(--line); background:var(--crypt)}
  button:active{transform:scale(.985)}

  input[type=text]{
    width:100%; font-size:26px; padding:13px 12px; margin:12px 0 8px;
    border:1px solid var(--line); border-radius:2px;
    background:#0f0d0a; color:var(--bone); font-family:'IM Fell English', serif;
  }
  input[type=text]:focus{outline:1px solid var(--gold); border-color:var(--gold)}
  input[type=text]::placeholder{color:#4d4233}

  .hintrevealed{
    border-left:2px solid var(--gold); padding:10px 14px; margin-top:12px;
    background:rgba(201,162,39,.06); font-style:italic; font-size:22px;
  }
  .hintrevealed b{font-family:'IM Fell English SC',serif; color:var(--gold); font-style:normal; font-weight:normal; letter-spacing:.1em; font-size:18px}
  .wrong{color:var(--blood-lit); font-size:20px; min-height:20px; margin:0; font-style:italic}

  .portrait-frame{
    width:190px; height:238px; margin:6px auto 14px; position:relative;
    border:1px solid var(--gold); border-radius:95px 95px 3px 3px;
    padding:7px; background:linear-gradient(180deg, rgba(201,162,39,.12), transparent);
    box-shadow:0 0 30px rgba(201,162,39,.12), inset 0 0 20px rgba(0,0,0,.5);
  }
  .portrait-frame .inner{
    width:100%; height:100%; overflow:hidden; border-radius:88px 88px 2px 2px;
    background:#0f0d0a; display:flex; align-items:center; justify-content:center;
    border:1px solid var(--line);
  }
  .portrait-frame img{width:100%; height:100%; object-fit:cover; object-position:top;
    filter:sepia(.25) contrast(1.05) brightness(.92);}
  .portrait-frame .placeholder{color:var(--line); font-size:81px}
  .portrait-caption{
    text-align:center; font-family:'IM Fell English SC',serif; font-size:19px;
    letter-spacing:.26em; color:var(--gold); margin-bottom:4px;
  }
  .victory-frame{
    margin:4px auto 16px; border:1px solid var(--gold); padding:8px;
    background:linear-gradient(180deg, rgba(201,162,39,.12), transparent);
    box-shadow:0 0 40px rgba(201,162,39,.15);
  }
  .victory-frame img{width:100%; display:block; filter:sepia(.2) contrast(1.05)}

  #celebrate{
    position:fixed; inset:0; display:none; align-items:center; justify-content:center;
    background:rgba(5,4,3,.8); z-index:50; flex-direction:column; padding:20px;
  }
  #celebrate.show{display:flex}
  #celebrate .msg{
    background:var(--crypt); color:var(--bone); border:1px solid var(--gold);
    border-radius:2px; padding:30px 30px; text-align:center; max-width:340px;
    box-shadow:0 0 60px rgba(201,162,39,.2);
  }
  #celebrate .msg .big{font-size:49px; margin-bottom:8px}
  #c-title{font-size:28px; font-style:italic; margin-bottom:6px}
  canvas#confetti{position:fixed; inset:0; pointer-events:none; z-index:60}

  .banner{
    font-size:20px; border:1px solid var(--cold); padding:10px 14px; margin-bottom:14px;
    background:rgba(79,107,125,.08); font-style:italic;
  }
  .small{font-size:19px; color:var(--bone-dim); font-style:italic}
  .center{text-align:center}
  .lore-head{
    font-family:'UnifrakturMaguntia',cursive; font-size:35px; color:var(--gold);
    text-align:center; margin-bottom:4px;
  }
  .lore-sub{
    text-align:center; font-family:'IM Fell English SC',serif; font-size:17px;
    letter-spacing:.3em; color:var(--bone-dim); margin-bottom:14px;
  }
  .lore-body{font-size:24px; line-height:1.7}
  .lore-img{margin:0 0 14px; border:1px solid var(--line); padding:6px; background:rgba(0,0,0,.3)}
  .lore-img img{width:100%; display:block; filter:sepia(.28) contrast(1.04) brightness(.94)}
  .lore-credit{font-size:14px; color:#5c503c; text-align:right; margin-top:4px; font-style:italic}
  .lore-body em{color:var(--gold)}
  @media (prefers-reduced-motion: reduce){ *{transition:none !important; animation:none !important} }
</style>
</head>

    <h1>The Quest of St. Mary</h1>
    <div class="bee" aria-hidden="true">

    </div>
    <hr class="rule">
  </header>

  <div class="strip" id="strip" style="display:none">
    <span>Seal <b id="s-stop">1</b>&#8202;/&#8202;9</span>
  </div>
  <div class="dots" id="dots" style="display:none"></div>

  <div id="screen"></div>
</div>

<div id="celebrate">
  <div class="msg">
    <div class="big" id="c-big">🕯️</div>
    <div id="c-title"></div>
    <div class="small" id="c-sub" style="margin-top:8px"></div>
    <button class="btn-primary" style="margin-top:18px" onclick="dismissCelebrate()">Continue</button>
  </div>
</div>
<canvas id="confetti"></canvas>

 { name:"The Toast", geo:null,
   riddle:"Every quest begins with a toast:\nraise the golden cup and drink\nto roads unwalked and seals unbroken,\ndown to the last bright brink.\nThen hold your glass turned upside down\nto prove your strength of hand:\nthe first clue will reveal itself\nright there where you stand.",
   way:"",

   ],
   tasks:[

      prompt:"Solve the riddle.",
      placeholder:"Your answer"}
   ],
   lore:{title:"The Toast", body:"<em>Skol: the toast of the mead halls, shouted over northern cups for a thousand years.</em> You drank mead on the night this all began, so Lord Daniel saw no reason to break tradition now. The cup is drained, the word is spoken, and the road is open. The first riddle waits at a white grove on the great avenue."}
 },
 { name:"The Columns", geo:null, aim:{lat:29.9274365, lon:-90.0961520},
   riddle:"But every hunt must first be fed.\nFind the grove that never grew:\nwhite trunks raised by hands long dead,\nsquare of bark and straight of root,\nwhere a homesick king of smoke once slept\nand porches watch the avenue.\nBeneath those branches take your seat;\norder wisely, and we begin.",
   way:"<b>the way</b> — Head southwest along the avenue. Lunch is fair play.",
   hints:[
     "What forest is planted by masons, not rain?",
     "An avenue of mansions; one wears its grove out front and serves lunch beneath it."
   ],
   tasks:[
     {type:"input", check:"contains", word:"gold",
      prompt:"Decode your order before the server comes:\nthis house was raised on golden leaf and smoke.\nOrder the cocktail named for a stampede toward treasure.\nWhat will you ask for?",
      placeholder:"I shall order..."},
     {type:"input", check:"list", answers:["smoke"],
      prompt:"Order it, said just so, and the server brings more than a drink.",
      placeholder:"Your answer"}
   ],
   lore:{img:"img/columns.jpg", credit:"Infrogmation, CC BY-SA 4.0", title:"The Columns", body:"<em>A grove that never once grew up: the white trunks are columns, planted by masons in 1883.</em> This was the private mansion of Simon Hernsheim, then the wealthiest cigar merchant in America, your homesick king of smoke; the word on your paper is his trade. The house kept its mahogany stairwell and stained glass through a century of reinvention, and it is now the last of the great St. Charles mansions you can simply walk into and order a drink. The paper is a writ of quest. Keep it."}
 },
 { name:"The Streetcar", geo:null, aim:{lat:29.9296, lon:-90.0862},
   riddle:"A rattling wyrm in green and brass\nhas crawled one road two hundred years.\nIt swallows all who pay to pass\nand, sated, spits them out in tiers.\nSeven times it stops and sighs;\nwhen Washington is called, arise.",
   way:"",
   hints:[
     "It is older than any living thing on the avenue, and it hums when it hunts.",
     "Olive green, brass bones, never hurried. Feed it a coin and face northeast."
   ],
   tasks:[
     {type:"input", check:"range", min:900, max:999,
      prompt:"Every wyrm of this line bears a number on its brow.\nWhich one swallowed you?",
      placeholder:"Your answer"}
   ],
   lore:{img:"img/streetcar.jpg", credit:"Eric Pancer, CC BY 2.0", title:"The Streetcar", body:"<em>The rattling wyrm is the St. Charles streetcar, which has crawled this one road since 1835: the oldest continuously operating street railway on Earth.</em> The olive-green cars are Perley Thomas originals from 1923, all brass fittings and mahogany seats, and the number you typed is stenciled on a car that has run this line for a century. It swallowed you at a mansion and spat you out among the dead, which is very in character for this city."}
 },
 { name:"Lafayette Cemetery No. 1", geo:{lat:29.9288342, lon:-90.0845229},
   riddle:"The quietest folk in all the ward\nkeep no quarrel, share no bread.\nTheir garden gate is locked and barred;\nyou may not walk among the dead.\nOne carved year began their rest:\nspeak it aloud, and pass the test.",
   way:"<b>the way</b> — From the streetcar stop, head southeast.",
   hints:[
     "Seven thousand neighbors, and not one has ever complained of the noise.",
     "Washington at Prytania. The city of the dead you may only greet through iron."
   ],
   tasks:[
     {type:"input", check:"list", answers:["1833"],
      prompt:"Read the gates. Bring me the year their rest began.",
      placeholder:"The carved year"}
   ],
   lore:{img:"img/cemetery.jpg", credit:"MusikAnimal, CC BY-SA 4.0", title:"Lafayette No. 1", body:"<em>The quietest folk who keep no quarrel are the roughly seven thousand New Orleanians resting here since the carved year, 1833.</em> This was the burial ground of the old City of Lafayette before New Orleans swallowed it, and its above-ground tombs filled fastest in the yellow fever summers, when whole families arrived within weeks of each other. Anne Rice's vampires prowled these paths in print and on film, which is why your next hostess lives only a few blocks away. The city keeps the gates locked for restoration. The residents have not complained."}
 },
 { name:"The Rink", geo:{lat:29.9300445, lon:-90.0848972},
   riddle:"Where wheels once sang on polished floors\nthe circling skaters turned to ghosts,\nand paper souls now line the shores,\na thousand lives on silent posts.\nOne guest is older than your tongue;\nhis mother's wrath was worse than his.\nFind him: his pages hold a word\nthat is not printed in the book.",
   way:"<b>the way</b> — Just across the street from the gates, to the north.",
   hints:[
     "The old skating rink keeps a bookshop now; its shelves hold a monster older than England.",
     "Ask the keeper of the books where Beowulf sleeps."
   ],
   tasks:[
     {type:"input", check:"list", answers:["hwaet","hwæt","hwat"],
      prompt:"The monster's book holds more than pages.\nFind what waits inside.",
      placeholder:"Your answer"},
     {type:"input", check:"contains", word:"espresso",
      prompt:"One task more before you go:\nbelow the books a potion hides,\nnight dressed up in morning's clothes,\nsleep's own color, sleep denied.\nOrder two by their true name,\nand drink to the halfway of this game.",
      placeholder:"Order it by name"}
   ],
   lore:{img:"img/beowulf.jpg", credit:"British Library, Cotton MS Vitellius A XV, public domain", title:"The Rink", body:"<em>Wheels once sang here because this was the Crescent City Skating Rink, built in 1884 when roller skating was a World's Fair craze.</em> The skaters gave way to shopkeepers, and the bookshop inside is where the Garden District buys its ghosts. The monster is Beowulf, some twelve hundred years old, whose mother remains literature's strongest argument for not troubling a quiet family; the word you found is how his story begins. The potion is yours; the bean wakes what the vodka loosens. Drink to the halfway."}
 },
 { name:"The Cornstalk Fence", geo:{lat:29.9297569, lon:-90.0843892},
   riddle:"No rain shall rot, no crow shall reap\nthe harvest at this garden's rim,\nsown by a man whose bride would weep\nfor prairie fields grown dear to him.\nEach winter kills it not at all,\neach summer feeds no mouth alive:\nwhat strange crop, along what wall,\nwas never planted, yet will thrive?",
   way:"<b>the way</b> — Head northeast.",
   hints:[
     "A crop that a blacksmith could grow and a locust could starve on.",
     "A homesick wife, an iron gift. Walk Prytania toward Fourth and watch the fences."
   ],
   tasks:[
     {type:"input", check:"list", answers:["corn","cornstalks","cornstalk","corn stalks","maize"],
      prompt:"Name the crop that was never planted, yet will thrive.",
      placeholder:"The crop"}
   ],
   lore:{img:"img/cornstalk.jpg", credit:"Arnold Genthe, Library of Congress, public domain", title:"The Cornstalk Fence", body:"<em>The crop never planted is corn, cast in iron around Colonel Short's Villa in 1859.</em> Colonel Robert Short's wife was homesick for the cornfields of her girlhood, so he ordered her a harvest that no drought, crow, or Louisiana summer could touch, complete with morning glories twining the stalks. It has outlived the colonel, the bride, and every real cornfield she missed. It is the most photographed fence in a neighborhood that takes its fences very seriously."}
 },
 { name:"The Anne Rice House", geo:{lat:29.9297860, lon:-90.0801445},
   riddle:"A woman gave the grave a tongue\nand made her deathless lovers young;\nher witches kept a storied hall\non the First of streets, most loved of all.\nHer iron bears a living sign:\nname the flower that will not pine.",
   way:"<b>the way</b> — Head northeast, then southeast.",
   hints:[
     "She interviewed a man who could never grow old, and buried her witches two blocks from here.",
     "First Street at Chestnut, the grand Greek Revival. Look closely at the fence."
   ],
   tasks:[
     {type:"input", check:"list", answers:["rose","roses","rosette","rosettes"],
      prompt:"Look to her fence. What flower blooms there in iron,\nand will never pine, nor fade, nor fall?",
      placeholder:"The flower"}
   ],
   lore:{img:"img/rosegate.jpg", credit:"GlennetteClark, CC BY 2.0", title:"Rosegate", body:"<em>The flower blooming in iron is the rose: the fence's rosettes gave this 1857 house its name, Rosegate.</em> Anne Rice, the woman who gave the grave a tongue, bought it in 1989 and made it the Mayfair witches' ancestral home in The Witching Hour; her deathless lovers, Louis and Lestat, were dreamed a few blocks from here. She once launched a book by leaving this house in a coffin, in a jazz funeral she threw for herself. The neighbors coped."}
 },
 { name:"Buckner Mansion", geo:{lat:29.9319568, lon:-90.0790925},
   riddle:"Eight-and-forty limbs of white\nuphold a house that is not home;\na screen-born coven spent one night\nand left me to the dust alone.\nMy gates are shut, my grounds are still:\ncount my limbs, if count you will.",
   way:"<b>the way</b> — Head northeast, then northwest.",
   hints:[

     "Jackson Avenue. The grandest house on it, wearing a forest of white."

   tasks:[

      placeholder:"Your count"}
   ],
   lore:{img:"img/buckner.jpg", credit:"Jeff Hitchcock, CC BY 2.0", title:"Buckner Mansion", body:"<em>Eight-and-forty limbs: the 48 fluted columns that cotton king Henry Buckner raised in 1856, reportedly to outshine a rival's mansion in Natchez.</em> For sixty years it housed the Soulé business college, and in 2013 television made it Miss Robichaux's Academy for Exceptional Young Ladies, the coven school of American Horror Story. The real house has witnessed no verified witchcraft. Whatever you counted, the columns will not confirm it after dark."}
 },
 { name:"The Roof", geo:{lat:29.9350837, lon:-90.0796890},
   riddle:"You walked among the sleeping dead,\npast iron corn and witches' walls;\nnow climb to where the cat once fled,\na tin roof hot above Saint Charles.\nEleven floors the tower knows;\nthe river bends, the sun drops slow.\nTwo glasses stand there, silver-dry:\ndrink to the hunt, the roof, the sky.",
   way:"<b>the way</b> — Head northwest, then northeast. Ride to the eleventh floor.",
   hints:[
     "A thirsty playwright named your ride an hour ago; his cat names your destination.",
     "An old hotel on the avenue keeps its bar closest to heaven. Ask for the roof."
   ],
   tasks:[
     {type:"input", check:"any", words:["bridge","crescent","connection"],
      prompt:"Look south, past the river's bend.\nTwin crescents of steel cross the water there.\nName what you see, and the quest is yours.",
      placeholder:"What do you see?"}
   ],
   lore:{img:"img/bridge.jpg", credit:"Infrogmation of New Orleans, CC BY-SA 4.0", title:"The Roof", body:"<em>The cat that fled up here belongs to Tennessee Williams, who lived in this hotel, the Pontchartrain, while shaping A Streetcar Named Desire: the wyrm you rode this afternoon runs through his title, and this bar is named for his hot tin roof.</em> The steel you named is the Crescent City Connection, twin spans over the river since 1958. Eleven floors up, the whole quest lies below you: the avenue, the oaks, the river's bend. These glasses are silver and dry. Drink slowly. You have earned the view."}
 }
];

let S = load() || { screen:"start", stop:0, task:0, hintsUsed:STOPS.map(()=>0), arrived:false, manual:false, done:false };
function save(){ localStorage.setItem("msq4", JSON.stringify(S)); }
function load(){ try{ return JSON.parse(localStorage.getItem("msq4")); }catch(e){ return null; } }

let watchId=null, geoOK=false;
function startGeo(){
  if(!("geolocation" in navigator)){ geoFail("no location service"); return; }
  try{
    watchId = navigator.geolocation.watchPosition(onPos, e=>geoFail(e.message),
      {enableHighAccuracy:true, maximumAge:3000, timeout:15000});
  }catch(e){ geoFail(String(e)); }
}
function geoFail(msg){ geoOK=false; }
function onPos(p){
  geoOK=true;
  if(S.done||S.screen==="start"||S.screen==="final") return;
  const t=STOPS[S.stop];
  if(!t.geo||S.arrived) return;
  const d=haversine(p.coords.latitude,p.coords.longitude,t.geo.lat,t.geo.lon);
  if(d<=UNLOCK_RADIUS) reached();
}
function haversine(a,b,c,d){
  const R=6371000, r=x=>x*Math.PI/180;
  const dLat=r(c-a), dLon=r(d-b);
  const h=Math.sin(dLat/2)**2+Math.cos(r(a))*Math.cos(r(c))*Math.sin(dLon/2)**2;
  return 2*R*Math.asin(Math.sqrt(h));
}

let wl=null;
async function keepAwake(){
  try{ if("wakeLock" in navigator){ wl=await navigator.wakeLock.request("screen");
    document.addEventListener("visibilitychange", async()=>{ if(document.visibilityState==="visible"&&wl!==null){ try{ wl=await navigator.wakeLock.request("screen"); }catch(e){} } });
  }}catch(e){}
}

function reached(){
  if(S.arrived) return;
  S.arrived=true;
  save();
  celebrate("🕯️", "You stand upon it", "the place itself bears witness");
  render();
}
function celebrate(icon,title,sub){
  document.getElementById("c-big").textContent=icon;
  document.getElementById("c-title").textContent=title;
  document.getElementById("c-sub").textContent=sub||"";
  document.getElementById("celebrate").classList.add("show");
  burst();
  if(navigator.vibrate) navigator.vibrate([80,40,80]);
}
function dismissCelebrate(){ document.getElementById("celebrate").classList.remove("show"); render(); }

function useHint(){
  if(S.hintsUsed[S.stop]>=2) return;
  S.hintsUsed[S.stop]++;
  save(); render();
}
function checkAnswer(task, raw){
  const v=(raw||"").trim().toLowerCase();
  if(task.check==="list") return task.answers.some(a=>v===a||v.includes(a));
  if(task.check==="contains") return v.includes(task.word);
  if(task.check==="any") return task.words.some(w=>v.includes(w));
  if(task.check==="range"){ const n=parseInt(v.replace(/\D/g,""),10); return !isNaN(n)&&n>=task.min&&n<=task.max; }
  return false;
}
function submitTask(){
  const t=STOPS[S.stop].tasks[S.task];
  const v=document.getElementById("answer").value;
  if(checkAnswer(t,v)){ taskDone(); }
  else{
    document.getElementById("wrong").textContent="Not so. Look again; the dead are patient, Lord Daniel less.";
    if(navigator.vibrate) navigator.vibrate(120);
  }
}
function taskDone(){
  const st=STOPS[S.stop];
  if(S.task < st.tasks.length-1){
    S.task++;
    save();
    celebrate("🗝️","The task is met","another asks…");
  } else {
    S.screen="lore";
    save();
    celebrate("🗝️","The seal is broken","Lord Daniel would speak…");
  }
}
function nextStop(){
  if(S.stop>=STOPS.length-1){ S.done=true; S.screen="final"; }
  else{ S.stop++; S.task=0; S.arrived=false; S.screen="clue"; }
  save(); render();
}

let pressT=null;
const hdr=document.getElementById("hdr");
hdr.addEventListener("touchstart",()=>{ pressT=setTimeout(refOverride,1600); },{passive:true});
hdr.addEventListener("touchend",()=>clearTimeout(pressT));
hdr.addEventListener("mousedown",()=>{ pressT=setTimeout(refOverride,1600); });
hdr.addEventListener("mouseup",()=>clearTimeout(pressT));
function refOverride(){
  if(S.screen!=="clue"||S.done) return;
  if(!S.arrived && STOPS[S.stop].geo) reached();
}

function esc(s){ return String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
function portraitHTML(caption){
  return `<div class="portrait-frame"><div class="inner">${
    PORTRAIT ? `<img src="${PORTRAIT}" alt="St. Mary">` : `<div class="placeholder">⚜</div>`
  }</div></div><div class="portrait-caption">${caption}</div>`;
}
function render(){
  const scr=document.getElementById("screen");
  const strip=document.getElementById("strip"), dots=document.getElementById("dots");

  if(S.screen==="start"){
    strip.style.display="none"; dots.style.display="none";
    scr.innerHTML=`
      <div class="card center">
        ${portraitHTML("St. Mary")}
        <p class="riddle" style="text-align:left">Claire. A quest is laid before you.\nThe dead, the witch, the iron harvest\nall wait to learn the victor's name.</p>
        <p class="small" style="margin:14px 0 4px">Hints wait beneath every riddle; open as many as you please.\nLord Daniel walks beside you and guides you on your quest.</p>
        <button class="btn-primary" style="margin-top:14px" onclick="begin()">Break the first seal</button>
      </div>
      `;
    return;
  }

  strip.style.display="flex"; dots.style.display="flex";
  document.getElementById("s-stop").textContent=Math.min(S.stop+1,STOPS.length);
  dots.innerHTML=STOPS.map((_,i)=>`<span class="dot ${i<S.stop?"done":i===S.stop?"now":""}"></span>`).join("");

  if(S.screen==="final"){
    scr.innerHTML=`
      <div class="card center">
        <div class="victory-frame">${
          VICTORY ? `<img src="${VICTORY}" alt="the victor">` : `<div style="font-size:81px; padding:30px 0; color:var(--line)">👑</div>`
        }</div>
        <h2 class="lore-head">The quest is beaten</h2>
        <p class="tasktext" style="text-align:center">Congratulations, St. Mary. The dead, the witch,\nand the iron harvest all know your name now.\nLord Daniel bows.</p>
      </div>
      <button class="btn-ghost" onclick="if(confirm('Reset the whole quest?')){localStorage.removeItem('msq4');location.reload()}">Reset the quest</button>`;
    return;
  }

  const st=STOPS[S.stop];
  const used=S.hintsUsed[S.stop];

  if(S.screen==="lore"){
    scr.innerHTML=`
      <div class="card">
        ${st.lore.img?`<div class="lore-img"><img src="${st.lore.img}" alt=""><div class="lore-credit">${esc(st.lore.credit||"")}</div></div>`:""}
        <div class="lore-head">${esc(st.lore.title)}</div>
        <div class="lore-sub">lord daniel's notes</div>
        <p class="lore-body">${st.lore.body}</p>
      </div>
      <button class="btn-primary" onclick="nextStop()">${S.stop>=STOPS.length-1?"The final word":"Break the next seal"}</button>`;
    return;
  }

  const hintBlock = Array.from({length:used},(_,i)=>`<div class="hintrevealed"><b>hint ${i+1}</b> — ${esc(st.hints[i])}</div>`).join("");
  const hintBtn = `
      <button class="btn-hint" onclick="useHint()" ${used>=2?"disabled":""}>
        ${used>=2?"No hints remain here":"Open a hint ("+(used+1)+" of 2)"}
      </button>`;

  const t=st.tasks[S.task];
  const multi=st.tasks.length>1 ? ` &middot; task ${S.task+1} of ${st.tasks.length}` : "";
  scr.innerHTML=`
      <div class="card">
        <div class="stopnum">seal ${S.stop+1} of ${STOPS.length}${multi}</div>
        <p class="riddle">${esc(st.riddle)}</p>
        ${st.way?`<p class="way">${st.way}</p>`:""}
        <p class="tasktext" style="margin-top:16px">${esc(t.prompt)}</p>
        <input type="text" id="answer" placeholder="${esc(t.placeholder||"Answer")}" autocomplete="off" autocapitalize="off">
        <p class="wrong" id="wrong"></p>
        <button class="btn-primary" onclick="submitTask()">Offer the answer</button>
        ${hintBlock}
      </div>
      ${hintBtn}`;
}
function begin(){ S.screen="clue"; save(); render(); startGeo(); keepAwake(); }

function burst(){
  if(matchMedia("(prefers-reduced-motion: reduce)").matches) return;
  const cv=document.getElementById("confetti"), ctx=cv.getContext("2d");
  cv.width=innerWidth; cv.height=innerHeight;
  const colors=["#c9a227","#8a1c1c","#d8c9a3","#5a6b4a","#e0bb4d"];
  const P=Array.from({length:110},()=>({
    x:innerWidth/2+(Math.random()-.5)*90, y:innerHeight*0.35,
    vx:(Math.random()-.5)*8, vy:-Math.random()*9-3,
    s:3+Math.random()*5, c:colors[Math.floor(Math.random()*colors.length)],
    r:Math.random()*Math.PI, vr:(Math.random()-.5)*.3, life:1
  }));
  let n=0;
  (function tick(){
    ctx.clearRect(0,0,cv.width,cv.height); n++;
    P.forEach(p=>{
      p.x+=p.vx; p.y+=p.vy; p.vy+=.26; p.r+=p.vr; p.life-=.008;
      ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.r);
      ctx.globalAlpha=Math.max(0,p.life);
      ctx.fillStyle=p.c; ctx.fillRect(-p.s/2,-p.s/2,p.s,p.s*.62);
      ctx.restore();
    });
    if(n<170) requestAnimationFrame(tick); else ctx.clearRect(0,0,cv.width,cv.height);
  })();
}

if(location.search.includes("reset")){
  localStorage.removeItem("msq4");
  S = { screen:"start", stop:0, task:0, hintsUsed:STOPS.map(()=>0), arrived:false, manual:false, done:false };
  history.replaceState(null, "", location.pathname);
}
render();
if(S.screen!=="start" && !S.done){ startGeo(); keepAwake(); }
</script>
</body>
</html>
